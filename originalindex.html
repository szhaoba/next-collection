</div>

        const i18n = {
            zh: {
                subtitle: "青少年/成人感觉处理量表 · 自评问卷",
                ageLabel: "年龄组", ageHint: "（常模对比依据）", reset: "重置", submit: "查看结果",
                resultTitle: "评估结果", rawData: "原始分数与作答明细 (治疗师用)",
                normNote: "常模基于无残疾人群，结果仅供专业参考，不作为临床诊断。",
                quadrants: { LR:"感觉迟钝 (Low Registration)", SS:"感觉寻求 (Sensation Seeking)", SE:"感觉敏感 (Sensory Sensitivity)", SA:"感觉回避 (Sensation Avoiding)" },
                classifications: ["远低于多数人","低于多数人","与多数人相似","高于多数人","远高于多数人"],
                options: ["几乎从不 (5%)","很少 (25%)","偶尔 (50%)","经常 (75%)","几乎总是 (95%)"],
                missingWarning: "您还有未作答的题目，请完成所有条目后再提交。",
                interpretationPrefix: "您的四象限感觉处理模式如下："
            },
            en: {
                subtitle: "Adolescent/Adult Sensory Profile · Self Questionnaire",
                ageLabel: "Age Group", ageHint: "(for norm comparison)", reset: "Reset", submit: "View Results",
                resultTitle: "Results", rawData: "Raw Scores & Response Details (for therapist)",
                normNote: "Norms based on individuals without disabilities. For professional reference only, not a clinical diagnosis.",
                quadrants: { LR:"Low Registration", SS:"Sensation Seeking", SE:"Sensory Sensitivity", SA:"Sensation Avoiding" },
                classifications: ["Much Less Than Most","Less Than Most","Similar to Most","More Than Most","Much More Than Most"],
                options: ["Almost Never (5%)","Seldom (25%)","Occasionally (50%)","Frequently (75%)","Almost Always (95%)"],
                missingWarning: "Some items are unanswered. Please complete all questions before submitting.",
                interpretationPrefix: "Your quadrant sensory processing patterns:"
            }
        };

        const norms = {
            "11-17": { LR:[15,18,19,26,27,40,41,51,52,75], SS:[15,27,28,41,42,58,59,65,66,75], SE:[15,19,20,25,26,40,41,48,49,75], SA:[15,18,19,25,26,40,41,48,49,75] },
            "18-64": { LR:[15,18,19,23,24,35,36,44,45,75], SS:[15,35,36,42,43,56,57,62,63,75], SE:[15,18,19,25,26,41,42,48,49,75], SA:[15,19,20,26,27,41,42,49,50,75] },
            "65+":   { LR:[15,19,20,26,27,40,41,51,52,75], SS:[15,28,29,39,40,52,53,63,64,75], SE:[15,18,19,25,26,41,42,48,49,75], SA:[15,18,19,25,26,42,43,49,50,75] }
        };

        // ---------- 渲染主问卷 ----------
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            let html = '';
            questions.forEach(q => {
                const text = currentLang === 'zh' ? q.textZh : q.textEn;
                html += `<div class="question-item"><div class="q-text">${q.id}. ${text}</div><div class="options">`;
                for (let i=0; i<5; i++) {
                    html += `<label class="option-label"><input type="radio" name="q${q.id}" value="${i+1}"><span>${i18n[currentLang].options[i]}</span></label>`;
                }
                html += `</div></div>`;
            });
            container.innerHTML = html;
            document.querySelectorAll('input[type="radio"]').forEach(r => r.addEventListener('change', updateProgress));
            updateProgress();
        }

        function updateProgress() {
            const total = questions.length;
            const answered = document.querySelectorAll('input[type="radio"]:checked').length;
            document.getElementById('progressFill').style.width = (answered/total*100)+'%';
        }

        // 语言切换
        function setLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang===lang));
            document.querySelectorAll('[data-i18n]').forEach(el => { if(i18n[lang][el.dataset.i18n]) el.textContent = i18n[lang][el.dataset.i18n]; });
            document.getElementById('subtitle').textContent = i18n[lang].subtitle;
            renderQuestions();
            if(document.getElementById('resultPanel').style.display !== 'none') showResults();
        }

        // 计分与展示
        function computeScores() {
            const scores = { LR:0, SS:0, SE:0, SA:0 };
            const details = [];
            questions.forEach(q => {
                const radio = document.querySelector(`input[name="q${q.id}"]:checked`);
                const val = radio ? parseInt(radio.value) : 0;
                scores[q.quad] += val;
                details.push({ id:q.id, quad:q.quad, answer:val, text: currentLang==='zh'?q.textZh:q.textEn });
            });
            return { scores, details };
        }

        // ★★★ 修正后的等级判断函数（处理超出常模范围的分数） ★★★
        function getClassification(quad, rawScore, ageGroup) {
            const norm = norms[ageGroup][quad];
            // 低于最低阈值 -> 远低于
            if (rawScore < norm[0]) return 0;
            // 高于最高阈值 -> 远高于
            if (rawScore > norm[9]) return 4;
            // 正常区间匹配
            for (let i = 0; i < 5; i++) {
                if (rawScore >= norm[i*2] && rawScore <= norm[i*2+1]) return i;
            }
            return 2; // 默认返回“相似”（理论上不会走到这里）
        }

        function showResults() {
            const age = document.getElementById('ageGroupSelect').value;
            const { scores, details } = computeScores();
            if(details.filter(d=>d.answer>0).length < questions.length) { alert(i18n[currentLang].missingWarning); return; }
            const panel = document.getElementById('resultPanel');
            panel.style.display = 'block';
            const quads = ['LR','SS','SE','SA'];
            const classIdx = quads.map(q => getClassification(q, scores[q], age));
            let html = `<h2>📋 ${i18n[currentLang].resultTitle} (${age})</h2><div class="quadrant-grid">`;
            quads.forEach((q,i) => { html += `<div class="quadrant-card"><div class="quadrant-name">${i18n[currentLang].quadrants[q]}</div><div class="score-badge">${scores[q]}</div><span class="classification">${i18n[currentLang].classifications[classIdx[i]]}</span></div>`; });
            html += `</div><div class="radar-container"><canvas id="radarChart"></canvas></div>`;
            html += `<p><strong>${i18n[currentLang].interpretationPrefix}</strong><br>${quads.map((q,i)=>`${i18n[currentLang].quadrants[q]}: ${scores[q]} (${i18n[currentLang].classifications[classIdx[i]]})`).join('； ')}</p>`;
            html += `<details><summary>📋 ${i18n[currentLang].rawData}</summary><table class="detail-table"><tr><th>#</th><th>题目</th><th>象限</th><th>得分</th></tr>`;
            details.forEach(d => { html += `<tr><td>${d.id}</td><td>${d.text.substring(0,30)}…</td><td>${d.quad}</td><td>${d.answer}</td></tr>`; });
            html += `</table><p><strong>总分：</strong> LR=${scores.LR}, SS=${scores.SS}, SE=${scores.SE}, SA=${scores.SA}</p></details>`;
            panel.innerHTML = html;
            const ctx = document.getElementById('radarChart').getContext('2d');
            if(radarChart) radarChart.destroy();
            radarChart = new Chart(ctx, { type:'radar', data:{ labels: quads.map(q=>i18n[currentLang].quadrants[q]), datasets:[{ data: quads.map(q=>scores[q]), backgroundColor:'rgba(59,130,246,0.2)', borderColor:'#3b82f6' }] }, options:{ scales:{ r:{ min:15, max:75 } } } });
        }

        function resetForm() {
            document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
            document.getElementById('resultPanel').style.display = 'none';
            updateProgress();
        }

        // ---------- 管理员面板逻辑 ----------
        function renderAdminTable() {
            const tbody = document.getElementById('adminTableBody');
            let html = '';
            questions.forEach(q => {
                html += `<tr>
                    <td>${q.id}</td>
                    <td><input type="text" value="${q.textEn.replace(/"/g,'&quot;')}" data-id="${q.id}" data-field="textEn"></td>
                    <td><input type="text" value="${q.textZh.replace(/"/g,'&quot;')}" data-id="${q.id}" data-field="textZh"></td>
                    <td><select data-id="${q.id}" data-field="quad">
                        <option value="LR" ${q.quad==='LR'?'selected':''}>LR</option>
                        <option value="SS" ${q.quad==='SS'?'selected':''}>SS</option>
                        <option value="SE" ${q.quad==='SE'?'selected':''}>SE</option>
                        <option value="SA" ${q.quad==='SA'?'selected':''}>SA</option>
                    </select></td>
                </tr>`;
            });
            tbody.innerHTML = html;
            tbody.querySelectorAll('input, select').forEach(el => el.addEventListener('change', (e) => {
                const id = parseInt(e.target.dataset.id);
                const field = e.target.dataset.field;
                const value = e.target.value;
                const q = questions.find(q => q.id === id);
                if(q) q[field] = value;
                localStorage.setItem('sensory_admin_questions', JSON.stringify(questions));
                document.getElementById('saveIndicator').textContent = '✅ 已自动保存';
                renderQuestions();
                if(document.getElementById('resultPanel').style.display !== 'none') showResults();
            }));
        }

        function showAdminPanel() {
            document.getElementById('adminPanel').classList.add('show');
            renderAdminTable();
        }

        function hideAdminPanel() {
            document.getElementById('adminPanel').classList.remove('show');
        }

        function showPasswordPrompt() {
            document.getElementById('passwordOverlay').style.display = 'flex';
            document.getElementById('passwordInput').value = '';
            document.getElementById('passwordInput').focus();
        }

        function setupTrigger() {
            const trigger = document.getElementById('versionTrigger');
            trigger.addEventListener('click', () => {
                clickCount++;
                clearTimeout(clickTimer);
                clickTimer = setTimeout(() => { clickCount = 0; }, 2000);
                if(clickCount >= 5) {
                    clickCount = 0;
                    if(!document.getElementById('adminPanel').classList.contains('show')) showPasswordPrompt();
                }
            });
        }

        function bindAdminControls() {
            document.getElementById('closeAdminBtn').addEventListener('click', hideAdminPanel);
            document.getElementById('exportAdminBtn').addEventListener('click', ()=>{
                const blob = new Blob([JSON.stringify(questions,null,2)], {type:'application/json'});
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'sensory_questions_backup.json'; a.click();
            });
            document.getElementById('importAdminBtn').addEventListener('click', ()=> document.getElementById('importFileInput').click());
            document.getElementById('importFileInput').addEventListener('change', (e)=>{
                const file = e.target.files[0]; if(!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        if(Array.isArray(imported) && imported.length===60) {
                            questions = imported;
                            localStorage.setItem('sensory_admin_questions', JSON.stringify(questions));
                            renderAdminTable();
                            renderQuestions();
                            if(document.getElementById('resultPanel').style.display !== 'none') showResults();
                        } else alert('格式错误：需要60题');
                    } catch(ex) { alert('无效JSON'); }
                };
                reader.readAsText(file);
            });
            document.getElementById('resetAdminBtn').addEventListener('click', ()=>{
                if(confirm('重置为默认题库？所有修改将丢失。')) {
                    questions = JSON.parse(JSON.stringify(DEFAULT_QUESTIONS));
                    localStorage.setItem('sensory_admin_questions', JSON.stringify(questions));
                    renderAdminTable();
                    renderQuestions();
                    if(document.getElementById('resultPanel').style.display !== 'none') showResults();
                }
            });
        }

        function bindPasswordModal() {
            document.getElementById('confirmPasswordBtn').addEventListener('click', ()=>{
                if(document.getElementById('passwordInput').value === ADMIN_PASSWORD) {
                    document.getElementById('passwordOverlay').style.display = 'none';
                    showAdminPanel();
                } else alert('密码错误');
            });
            document.getElementById('cancelPasswordBtn').addEventListener('click', ()=> document.getElementById('passwordOverlay').style.display = 'none');
        }

        // 初始化
        window.onload = () => {
            renderQuestions();
            setLanguage('zh');
            document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', (e)=> setLanguage(e.target.dataset.lang)));
            document.getElementById('submitBtn').addEventListener('click', showResults);
            document.getElementById('resetBtn').addEventListener('click', resetForm);
            setupTrigger();
            bindAdminControls();
            bindPasswordModal();
        };
    })();
</script>
</body>
</html>
